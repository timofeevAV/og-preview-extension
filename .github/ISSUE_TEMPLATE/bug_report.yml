name: Bug Report
description: Report a bug or unexpected behavior
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
      description: Which browser(s) did you see this on?
      placeholder: 'Chrome 131, Edge 131, Brave 1.73'
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Extension version
      description: Version from the extension popup or chrome://extensions
      placeholder: '0.1.0'
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, screenshots, or screen recordings
    validations:
      required: false
